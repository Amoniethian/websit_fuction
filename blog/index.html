<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Song///</title>
    <link rel="stylesheet" href="style.css">
    <script src="../email-gate.js"></script>
    <style>
        @keyframes badgePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.15); }
        }
    </style>
</head>
<body>
    <!-- Top Navigation -->
    <nav class="navbar">
        <div class="logo">Blog</div>
        <div class="nav-actions">
            <button title="Notifications">🔔</button>
            <button title="Search">🔍</button>
            <div class="user-avatar" id="nav-visitor-avatar"></div>
        </div>
    </nav>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Sidebar - Blogger Profile -->
        <aside class="sidebar">
            <div class="profile-card">
                <div class="profile-cover"></div>
                <div class="profile-info">
                    <div class="profile-avatar" id="blogger-avatar"></div>
                    <div class="profile-name">
                        <span id="blogger-display-name"></span>
                        <span class="verified-badge" id="verified-badge" style="display: none;">✓</span>
                    </div>
                    <div class="profile-username" id="blogger-username"></div>
                    <div class="profile-bio" id="blogger-bio"></div>
                    <div class="profile-location" id="blogger-location"></div>
                    <div class="profile-stats">
                        <div class="stat-item">
                            <div class="stat-number" id="stat-followers"></div>
                            <div class="stat-label">Followers</div>
                        </div>
                        <div class="stat-item">
                            <div class="stat-number" id="stat-following"></div>
                            <div class="stat-label">Following</div>
                        </div>
                    </div>
                </div>
                <div class="profile-actions">
                    <button class="btn-message" onclick="openChat()" style="position:relative;">
                        💬 Message
                        <span class="new-msg-badge" id="new-msg-badge" style="display:none;position:absolute;top:-8px;right:-8px;background:#ff3b30;color:#fff;font-size:11px;font-weight:700;width:20px;height:20px;border-radius:50%;align-items:center;justify-content:center;font-family:'Inter',sans-serif;box-shadow:0 2px 6px rgba(255,59,48,0.4);animation:badgePulse 1.5s infinite;">1</span>
                    </button>
                </div>
            </div>
        </aside>

        <!-- Posts -->
        <main class="posts-container" id="posts-container"></main>
    </div>

    <!-- Chat / DM Window -->
    <div class="chat-overlay" id="chat-overlay">
        <div class="chat-window">
            <div class="chat-header">
                <div class="avatar" id="chat-blogger-avatar"></div>
                <div class="info">
                    <div class="name" id="chat-blogger-name"></div>
                    <div class="status" id="chat-status"></div>
                </div>
                <button class="chat-close" onclick="closeChat()">×</button>
            </div>
            <div class="chat-messages" id="chat-messages">
                <div class="typing-indicator" id="typing-indicator">
                    <span>.</span><span>.</span><span>.</span> typing
                </div>
                <div class="no-reply-notice" id="no-reply-notice"></div>
            </div>
            <div class="chat-input-container">
                <input type="text" class="chat-input" id="chat-input" placeholder="Type a message..." onkeypress="handleChatKeypress(event)">
                <button class="chat-send" id="chat-send" onclick="sendMessage()">➤</button>
            </div>
        </div>
    </div>

    <!-- Talk to Me horror overlay -->
    <div id="talktome-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:100000;display:none;overflow:hidden;"></div>
    <style>
        .ttm-text {
            position: absolute;
            font-family: 'Times New Roman', serif;
            color: #cc0000;
            text-transform: uppercase;
            letter-spacing: 0.15em;
            white-space: nowrap;
            text-shadow: 0 0 15px rgba(255,0,0,0.5);
            animation: ttmShake 0.08s infinite;
        }
        @keyframes ttmShake {
            0% { transform: translate(0, 0) skewX(0deg); }
            25% { transform: translate(3px, -2px) skewX(-2deg); }
            50% { transform: translate(-4px, 3px) skewX(2deg); }
            75% { transform: translate(2px, -1px) skewX(-1deg); }
            100% { transform: translate(-3px, 2px) skewX(1deg); }
        }
    </style>

    <!-- Transition-in overlay (prevents flash when arriving from memorial page) -->
    <div id="transition-overlay" style="position:fixed;top:0;left:0;width:100%;height:100%;background:#000;z-index:99999;transition:opacity 0.8s ease;pointer-events:none;"></div>

    <!-- Bilingual toggle button (dev tool) -->
    <button id="cn-toggle" onclick="document.body.classList.toggle('show-cn'); this.textContent = document.body.classList.contains('show-cn') ? '中/EN ✓' : '中/EN'" style="position:fixed;bottom:20px;right:20px;z-index:9999;background:#333;color:#fff;border:none;padding:8px 14px;border-radius:20px;font-size:12px;cursor:pointer;opacity:0.7;transition:opacity 0.2s;font-family:sans-serif;" onmouseover="this.style.opacity='1'" onmouseout="this.style.opacity='0.7'">中/EN</button>

    <script src="config.js"></script>
    <script>
        // ========== Global State ==========
        let replyCount = 0;
        const config = BLOG_CONFIG;

        // ========== Utility Functions ==========
        function formatNumber(num) {
            if (num >= 1000000) return (num / 1000000).toFixed(1) + 'M';
            if (num >= 1000) return (num / 1000).toFixed(1) + 'K';
            return num.toLocaleString();
        }

        function getInitial(name) {
            return name.charAt(0).toUpperCase();
        }

        function tryAlternateImageFormat(img, fallbackFn) {
            const src = img.src;
            if (img.dataset.triedAlt) {
                fallbackFn();
                return;
            }
            img.dataset.triedAlt = '1';
            if (/\.jpe?g$/i.test(src)) {
                img.src = src.replace(/\.jpe?g$/i, '.png');
            } else if (/\.png$/i.test(src)) {
                img.src = src.replace(/\.png$/i, '.jpg');
            } else {
                fallbackFn();
            }
        }

        function createAvatarElement(src, name, size = 44) {
            const container = document.createElement('div');
            if (src) {
                const img = document.createElement('img');
                img.src = src;
                img.alt = name;
                img.onerror = function() {
                    tryAlternateImageFormat(this, () => {
                        this.parentElement.innerHTML = `<div class="avatar-placeholder" style="width:${size}px;height:${size}px;">${getInitial(name)}</div>`;
                    });
                };
                container.appendChild(img);
            } else {
                container.innerHTML = `<div class="avatar-placeholder" style="width:${size}px;height:${size}px;">${getInitial(name)}</div>`;
            }
            return container.innerHTML;
        }

        // ========== Init Page ==========
        function initPage() {
            const blogger = config.blogger;
            const visitor = config.visitor;

            document.title = `${blogger.displayName}'s Blog`;
            document.getElementById('nav-visitor-avatar').textContent = getInitial(visitor.displayName);

            const bloggerAvatarEl = document.getElementById('blogger-avatar');
            bloggerAvatarEl.innerHTML = createAvatarElement(blogger.avatar, blogger.displayName, 80);

            document.getElementById('blogger-display-name').textContent = blogger.displayName;
            document.getElementById('blogger-username').textContent = '@' + blogger.name;
            document.getElementById('blogger-bio').textContent = blogger.bio;
            document.getElementById('blogger-location').textContent = blogger.location;

            if (blogger.verified) {
                document.getElementById('verified-badge').style.display = 'flex';
            }

            document.getElementById('stat-followers').textContent = formatNumber(blogger.followers);
            document.getElementById('stat-following').textContent = formatNumber(blogger.following);

            document.getElementById('chat-blogger-avatar').innerHTML = createAvatarElement(blogger.avatar, blogger.displayName);
            document.getElementById('chat-blogger-name').textContent = blogger.displayName;
            document.getElementById('chat-status').textContent = config.chat.bloggerStatus;
            if (config.chat.bloggerOnline) {
                document.getElementById('chat-status').classList.add('online');
            }

            // Dev mode: show Chinese with ?cn=1
            if (new URLSearchParams(window.location.search).has('cn')) {
                document.body.classList.add('show-cn');
            }

            renderPosts();
            initChatHistory();

            // Handle transition-in overlay
            const overlay = document.getElementById('transition-overlay');
            if (localStorage.getItem('memorial_secret_unlocked') === 'true') {
                // Coming from memorial — fade out the black overlay smoothly
                const badge = document.getElementById('new-msg-badge');
                if (badge) {
                    badge.style.display = 'flex';
                }
                requestAnimationFrame(() => {
                    overlay.style.opacity = '0';
                    overlay.addEventListener('transitionend', () => overlay.remove(), { once: true });
                });
            } else {
                // Normal visit — remove overlay immediately
                overlay.remove();
            }
        }

        // ========== Render Posts ==========
        function renderPosts() {
            const container = document.getElementById('posts-container');
            const blogger = config.blogger;
            const visitor = config.visitor;

            config.posts.forEach(post => {
                const postEl = document.createElement('article');
                postEl.className = 'post-card';
                postEl.id = `post-${post.id}`;

                let commentsHtml = '';
                // Move palette link comment to a random position in the first 3
                let comments = [...post.comments];
                const paletteIdx = comments.findIndex(c => c.content && c.content.includes('palette/index.html'));
                if (paletteIdx > 2) {
                    const [paletteComment] = comments.splice(paletteIdx, 1);
                    const randomPos = Math.floor(Math.random() * Math.min(3, comments.length));
                    comments.splice(randomPos, 0, paletteComment);
                }
                comments.forEach(comment => {
                    const isVisitor = comment.username === visitor.name;
                    commentsHtml += `
                        <div class="comment-item">
                            <div class="comment-avatar">${createAvatarElement(comment.avatar, comment.username, 36)}</div>
                            <div class="comment-body">
                                <div class="comment-username ${isVisitor ? 'is-visitor' : ''}">${comment.username}</div>
                                <div class="comment-text">${comment.content}</div>
                                <div class="comment-meta">
                                    <span>${comment.time}</span>
                                    <button class="like-btn" onclick="toggleCommentLike(this, ${comment.likes})">🤍 ${comment.likes}</button>
                                </div>
                            </div>
                        </div>
                    `;
                });

                let imagesHtml = '';
                if (post.images && post.images.length > 0) {
                    imagesHtml = `
                        <div class="post-images">
                            <img src="${post.images[0]}" alt="Post image" onerror="tryAlternateImageFormat(this, () => { this.outerHTML='<div class=\\'placeholder\\'>[ Image placeholder ]</div>'; })">
                        </div>
                    `;
                }

                postEl.innerHTML = `
                    <div class="post-header">
                        <div class="avatar">${createAvatarElement(blogger.avatar, blogger.displayName)}</div>
                        <div class="info">
                            <div class="name">
                                ${blogger.displayName}
                                ${blogger.verified ? '<span class="verified-badge">✓</span>' : ''}
                            </div>
                            <div class="meta">${post.publishDate} ${post.publishTime}</div>
                        </div>
                    </div>
                    <div class="post-content">
                        <h2 class="post-title">${post.title}</h2>
                        <div class="post-text">${post.content}</div>
                        ${imagesHtml}
                    </div>
                    <div class="post-stats">
                        <span>👁 ${formatNumber(post.views)} views</span>
                        <span>❤ ${formatNumber(post.likes)} likes</span>
                        <span>💬 ${post.comments.length} comments</span>
                    </div>
                    <div class="post-actions">
                        <button class="${post.liked ? 'liked' : ''}" onclick="toggleLike(${post.id}, this)">
                            ${post.liked ? '❤' : '🤍'} Like
                        </button>
                        <button onclick="toggleComments(${post.id})">
                            💬 Comments
                        </button>
                        <button>
                            🔗 Share
                        </button>
                    </div>
                    <div class="comments-section" id="comments-${post.id}" style="display: none;">
                        <div class="comments-header">Comments (${post.comments.length})</div>
                        ${commentsHtml}
                    </div>
                `;

                container.appendChild(postEl);
            });
        }

        // ========== Interactions ==========
        function toggleLike(postId, btn) {
            const post = config.posts.find(p => p.id === postId);
            if (post) {
                post.liked = !post.liked;
                if (post.liked) {
                    post.likes++;
                    btn.classList.add('liked');
                    btn.innerHTML = '❤ Like';
                } else {
                    post.likes--;
                    btn.classList.remove('liked');
                    btn.innerHTML = '🤍 Like';
                }
                const statsEl = btn.closest('.post-card').querySelector('.post-stats span:nth-child(2)');
                statsEl.textContent = '❤ ' + formatNumber(post.likes) + ' likes';
            }
        }

        function toggleCommentLike(btn, originalLikes) {
            const isLiked = btn.classList.toggle('liked');
            const count = isLiked ? originalLikes + 1 : originalLikes;
            btn.innerHTML = (isLiked ? '❤' : '🤍') + ' ' + count;
        }

        function toggleComments(postId) {
            const commentsEl = document.getElementById(`comments-${postId}`);
            commentsEl.style.display = commentsEl.style.display === 'none' ? 'block' : 'none';
        }

        // ========== Chat / DM ==========
        function openChat() {
            document.getElementById('chat-overlay').classList.add('active');
            scrollChatToBottom();
            document.getElementById('chat-input').focus();

            // Clear new message badge when opening chat
            const badge = document.getElementById('new-msg-badge');
            if (badge) {
                badge.style.display = 'none';
            }
            localStorage.removeItem('memorial_secret_unlocked');
        }

        function closeChat() {
            document.getElementById('chat-overlay').classList.remove('active');
        }

        function initChatHistory() {
            config.chat.history.forEach(msg => {
                addMessageToChat(msg.content, msg.sender === 'visitor', msg.time, msg.contentCn);
            });
        }

        function addMessageToChat(content, isSent, time = null, contentCn = null) {
            const messagesContainer = document.getElementById('chat-messages');
            const typingIndicator = document.getElementById('typing-indicator');

            const msgEl = document.createElement('div');
            msgEl.className = `message ${isSent ? 'sent' : 'received'}`;
            const cnHtml = contentCn ? `<span class="cn">${contentCn}</span>` : '';
            msgEl.innerHTML = `
                ${content}
                ${cnHtml}
                ${time ? `<span class="time">${time}</span>` : ''}
            `;

            messagesContainer.insertBefore(msgEl, typingIndicator);
            scrollChatToBottom();
        }

        function scrollChatToBottom() {
            const messagesContainer = document.getElementById('chat-messages');
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
        }

        function getCurrentTime() {
            const now = new Date();
            const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
            const hours = now.getHours().toString().padStart(2, '0');
            const minutes = now.getMinutes().toString().padStart(2, '0');
            return `${now.getDate()} ${months[now.getMonth()]} ${hours}:${minutes}`;
        }

        // ========== Talk to Me Horror Trigger ==========
        let talkToMeTriggered = localStorage.getItem('talktome_triggered') === 'true';

        const TRIGGER_KEYWORDS = [
            /死/, /不是.*死了/, /已经.*死/,
            /你在哪/, /在哪儿/, /where.*you/i, /where.*are/i,
            /怎么找/, /如何找/, /how.*find/i, /come.*find/i,
            /找到你/
        ];

        function checkTalkToMeTrigger(text) {
            if (talkToMeTriggered) return false;
            return TRIGGER_KEYWORDS.some(re => re.test(text));
        }

        function triggerTalkToMeSequence() {
            talkToMeTriggered = true;
            localStorage.setItem('talktome_triggered', 'true');

            const typingIndicator = document.getElementById('typing-indicator');

            // Step 1: Lucius replies with the hint
            typingIndicator.classList.add('active');
            scrollChatToBottom();

            setTimeout(() => {
                typingIndicator.classList.remove('active');
                const hintMsg = "Want to know more? Come find me at T1004. The password is <strong>C3469X</strong>.";
                const hintMsgCn = "想知道更多？来T1004找我。密码是 <strong>C3469X</strong>。";
                addMessageToChat(hintMsg, false, getCurrentTime(), hintMsgCn);

                // Mark this message so we can preserve it later
                const allMsgs = document.querySelectorAll('#chat-messages .message.received');
                const lastMsg = allMsgs[allMsgs.length - 1];
                if (lastMsg) lastMsg.setAttribute('data-ttm-hint', 'true');

                // Step 2: Start the "talk to me" spam sequence
                startTalkToMeSpam();
            }, 3000);
        }

        function startTalkToMeSpam() {
            const spamMessages = [];

            // 3s interval × 2
            // 1s interval × 3
            // then 12 rapid fire
            const timings = [
                3000, 3000,      // 2 messages, 3s apart
                1000, 1000, 1000, // 3 messages, 1s apart
                // 12 rapid fire (100ms each)
                100, 100, 100, 100, 100, 100,
                100, 100, 100, 100, 100, 100
            ];

            let delay = 3000; // initial delay after hint message

            timings.forEach((interval, i) => {
                delay += interval;
                setTimeout(() => {
                    const msg = addMessageToChat("talk to me", false, null);
                    // Tag spam messages for later removal
                    const allMsgs = document.querySelectorAll('#chat-messages .message.received:not([data-ttm-hint])');
                    const lastReceived = allMsgs[allMsgs.length - 1];
                    if (lastReceived && !lastReceived.hasAttribute('data-ttm-hint')) {
                        lastReceived.classList.add('ttm-spam');
                    }

                    // After the last rapid-fire message, trigger the overlay
                    if (i === timings.length - 1) {
                        setTimeout(() => showTalkToMeOverlay(), 200);
                    }
                }, delay);
            });
        }

        function showTalkToMeOverlay() {
            const overlay = document.getElementById('talktome-overlay');
            overlay.style.display = 'block';
            overlay.innerHTML = '';

            const startTime = Date.now();
            const duration = 3000; // 3 seconds

            // Continuously add shaking "Talk to Me" text during 3 seconds
            let textCount = 0;
            const addInterval = setInterval(() => {
                const elapsed = Date.now() - startTime;
                if (elapsed >= duration) {
                    clearInterval(addInterval);
                    endTalkToMeEffect();
                    return;
                }

                // Add 2-4 texts per frame
                const batchSize = 2 + Math.floor(Math.random() * 3);
                for (let i = 0; i < batchSize; i++) {
                    const el = document.createElement('div');
                    el.className = 'ttm-text';
                    el.textContent = 'Talk to Me';
                    const x = Math.random() * 90 + 2;
                    const y = Math.random() * 90 + 2;
                    const size = 1 + Math.random() * 5;
                    el.style.cssText = `left:${x}%;top:${y}%;font-size:${size}vw;animation-delay:${Math.random()*0.1}s;`;
                    overlay.appendChild(el);
                    textCount++;
                }
            }, 60); // ~16fps text spawn
        }

        function endTalkToMeEffect() {
            const overlay = document.getElementById('talktome-overlay');

            // Fade out
            overlay.style.transition = 'opacity 0.5s';
            overlay.style.opacity = '0';

            setTimeout(() => {
                overlay.style.display = 'none';
                overlay.style.opacity = '1';
                overlay.style.transition = '';
                overlay.innerHTML = '';

                // Clean up: remove all "talk to me" spam messages
                document.querySelectorAll('#chat-messages .ttm-spam').forEach(el => el.remove());

                scrollChatToBottom();
            }, 600);
        }

        function sendMessage() {
            const input = document.getElementById('chat-input');
            const content = input.value.trim();

            if (!content) return;

            addMessageToChat(content, true, getCurrentTime());
            input.value = '';

            // Check for Talk to Me trigger keywords
            if (checkTalkToMeTrigger(content)) {
                triggerTalkToMeSequence();
                return;
            }

            if (replyCount < config.chat.maxReplies) {
                const typingIndicator = document.getElementById('typing-indicator');
                typingIndicator.classList.add('active');
                scrollChatToBottom();

                const autoReply = config.chat.autoReplies[replyCount];
                setTimeout(() => {
                    typingIndicator.classList.remove('active');
                    addMessageToChat(autoReply.reply, false, getCurrentTime(), autoReply.replyCn);
                    replyCount++;

                    if (replyCount >= config.chat.maxReplies) {
                        setTimeout(() => {
                            const noReplyNotice = document.getElementById('no-reply-notice');
                            noReplyNotice.textContent = config.chat.noMoreReplyMessage;
                            noReplyNotice.classList.add('active');
                            scrollChatToBottom();
                        }, 2000);
                    }
                }, autoReply.delay);
            }
        }

        function handleChatKeypress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }

        // Close on overlay click
        document.getElementById('chat-overlay').addEventListener('click', function(e) {
            if (e.target === this) {
                closeChat();
            }
        });

        // ========== Encrypted Video ==========
        function unlockVideo(postId) {
            const post = config.posts.find(p => p.id === postId);
            if (!post || !post.videoPassword) return;
            const pwd = document.getElementById('video-pwd-' + postId).value;
            const errorEl = document.getElementById('video-error-' + postId);
            if (pwd === post.videoPassword) {
                document.querySelector('#encrypted-video-' + postId + ' .video-lock').style.display = 'none';
                const player = document.getElementById('video-player-' + postId);
                player.style.display = 'block';
                // Trigger load for fastest playback
                const video = player.querySelector('video');
                if (video) video.load();
            } else {
                errorEl.textContent = 'Incorrect extraction code.';
                errorEl.style.display = 'block';
            }
        }

        // Init
        document.addEventListener('DOMContentLoaded', initPage);
    </script>
</body>
</html>
