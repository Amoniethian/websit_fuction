<svg xmlns="http://www.w3.org/2000/svg" width="600" height="800" viewBox="0 0 600 800">
  <defs>
    <filter id="paper">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="5" result="noise"/>
      <feDiffuseLighting in="noise" lighting-color="#f5f0e0" surfaceScale="2" result="light">
        <feDistantLight azimuth="45" elevation="55"/>
      </feDiffuseLighting>
      <feComposite in="SourceGraphic" in2="light" operator="arithmetic" k1="1" k2="0" k3="0" k4="0"/>
    </filter>
  </defs>
  <rect width="600" height="800" fill="#f5f0e0"/>
  <rect x="15" y="15" width="570" height="770" fill="none" stroke="#c0b8a0" stroke-width="1" stroke-dasharray="4,2"/>
  <rect x="40" y="40" width="520" height="50" fill="#e8e0d0" rx="2"/>
  <text x="300" y="72" text-anchor="middle" font-family="'Courier New', monospace" font-size="13" font-weight="bold" fill="#333">DOCUMENT SCAN #7</text>
  <line x1="40" y1="110" x2="560" y2="110" stroke="#b0a890" stroke-width="0.8"/>
  <text x="300" y="140" text-anchor="middle" font-family="'Georgia', serif" font-size="16" font-weight="bold" fill="#2a2a2a">COMMUNICATION LOG — Heinrich ↔ Network</text>
  <text x="300" y="170" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#666">Encrypted messages recovered from Munich study</text>
  <line x1="40" y1="190" x2="560" y2="190" stroke="#b0a890" stroke-width="0.5"/>
  <text x="50" y="220" font-family="'Courier New', monospace" font-size="10" fill="#888">CLASSIFICATION: TOP SECRET / BLACK ARCHIVE</text>
  <text x="50" y="240" font-family="'Courier New', monospace" font-size="10" fill="#888">HANDLING: EYES ONLY — NO REPRODUCTION</text>
  <rect x="60" y="270" width="480" height="400" fill="#faf7f0" stroke="#d0c8b0" stroke-width="0.5" rx="2"/>
  <text x="300" y="460" text-anchor="middle" font-family="'Courier New', monospace" font-size="18" fill="#bbb">[ DOCUMENT CONTENT ]</text>
  <text x="300" y="490" text-anchor="middle" font-family="'Courier New', monospace" font-size="11" fill="#ccc">Original scan not digitized</text>
  <line x1="40" y1="710" x2="560" y2="710" stroke="#b0a890" stroke-width="0.5"/>
  <text x="50" y="735" font-family="'Courier New', monospace" font-size="9" fill="#999">HOFFMANN FAMILY ARCHIVES — RESTRICTED ACCESS</text>
  <text x="550" y="735" text-anchor="end" font-family="'Courier New', monospace" font-size="9" fill="#999">PAGE 1 OF 1</text>
  <text x="300" y="770" text-anchor="middle" font-family="'Courier New', monospace" font-size="8" fill="#bbb">⚠ UNAUTHORIZED DISCLOSURE SUBJECT TO CRIMINAL PROSECUTION ⚠</text>
</svg>
